# =========================================================
# nginx-security.conf — Security headers for ranuk.dev
# Include this file in your server block or use inline
# Test with: nginx -t
# =========================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=connections:10m;

# Block common bots and scanners
map $http_user_agent $bad_bot {
    default 0;
    ~*(?i)(sqlmap|nikto|nmap| Nessus|masscan|zgrab) 1;
    ~*(?i)(wget|curl).*\.(php|asp|aspx|jsp) 1;
}

# Security headers map
map $sent_http_content_type $csp_nonce {
    default "";
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ranuk.dev www.ranuk.dev;

    # SSL Configuration (hard)
    ssl_certificate /etc/letsencrypt/live/ranuk.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ranuk.dev/privkey.pem;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/ranuk.dev/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Root and index
    root /var/www/ranuk.dev;
    index index.html;

    # Hide Nginx version
    server_tokens off;

    # === SECURITY HEADERS (Critical) ===

    # Content Security Policy - Strict
    # Note: After moving GA to ga.js, 'unsafe-inline' can be removed from script-src
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://vitals.vercel-insights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests;" always;

    # HSTS - HTTP Strict Transport Security
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # MIME type sniffing protection
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (deprecated but good for legacy browsers)
    add_header X-XSS-Protection "0" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy - No access to sensitive APIs
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), vr=(), battery=(), ambient-light-sensor=(), autoplay=(self)" always;

    # Corp/Coop/Coep
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # === RATE LIMITING ===
    limit_req zone=general burst=20 nodelay;
    limit_conn connections 10;

    # === BOT PROTECTION ===
    if ($bad_bot) {
        return 444;
    }

    # === STATIC ASSETS CACHE CONTROL ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;

        # CORS for fonts
        location ~* \.(woff2?|ttf|eot|otf)$ {
            add_header Access-Control-Allow-Origin "*" always;
        }
    }

    # HTML files - no cache for dynamic content
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Deny access to sensitive files
    location ~ /(\.|git|env|config|md|log|sh|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # Deny access to package.json and server files
    location ~ (package\.json|server.*\.js|update-versions.*|hot-reload.*) {
        deny all;
        return 404;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;

        # Additional rate limit for specific paths
        location ~ ^/(data|scripts)/ {
            limit_req zone=general burst=5 nodelay;
        }
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ranuk.dev www.ranuk.dev;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}
