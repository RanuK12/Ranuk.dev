<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ccd6f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Bracket left -->
  <text x="10" y="82" font-family="'Fira Code', monospace" font-size="56" font-weight="400" fill="#64ffda" opacity="0.7">&lt;</text>
  <!-- R mark -->
  <g transform="translate(52, 18)">
    <rect x="0" y="0" width="68" height="82" rx="6" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
    <text x="14" y="62" font-family="'Inter', sans-serif" font-size="54" font-weight="900" fill="url(#grad)">R</text>
  </g>
  <!-- Bracket right + slash -->
  <text x="125" y="82" font-family="'Fira Code', monospace" font-size="56" font-weight="400" fill="#64ffda" opacity="0.7">/&gt;</text>
  <!-- Company name -->
  <text x="200" y="55" font-family="'Inter', sans-serif" font-size="26" font-weight="700" fill="url(#textGrad)" letter-spacing="1">RANUK</text>
  <text x="200" y="85" font-family="'Inter', sans-serif" font-size="16" font-weight="300" fill="#8892b0" letter-spacing="4">DEVELOPMENT</text>
</svg>
