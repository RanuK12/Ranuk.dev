<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08" fill="#64ffda">
    <circle cx="100" cy="100" r="2"/><circle cx="160" cy="100" r="2"/><circle cx="220" cy="100" r="2"/><circle cx="280" cy="100" r="2"/><circle cx="340" cy="100" r="2"/>
    <circle cx="100" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="220" cy="160" r="2"/><circle cx="280" cy="160" r="2"/><circle cx="340" cy="160" r="2"/>
    <circle cx="100" cy="220" r="2"/><circle cx="160" cy="220" r="2"/><circle cx="220" cy="220" r="2"/><circle cx="280" cy="220" r="2"/><circle cx="340" cy="220" r="2"/>
    <circle cx="860" cy="400" r="2"/><circle cx="920" cy="400" r="2"/><circle cx="980" cy="400" r="2"/><circle cx="1040" cy="400" r="2"/><circle cx="1100" cy="400" r="2"/>
    <circle cx="860" cy="460" r="2"/><circle cx="920" cy="460" r="2"/><circle cx="980" cy="460" r="2"/><circle cx="1040" cy="460" r="2"/><circle cx="1100" cy="460" r="2"/>
    <circle cx="860" cy="520" r="2"/><circle cx="920" cy="520" r="2"/><circle cx="980" cy="520" r="2"/><circle cx="1040" cy="520" r="2"/><circle cx="1100" cy="520" r="2"/>
  </g>

  <!-- Code bracket left -->
  <text x="80" y="290" font-family="monospace" font-size="160" font-weight="300" fill="#64ffda" opacity="0.15">{</text>

  <!-- Code bracket right -->
  <text x="1050" y="420" font-family="monospace" font-size="160" font-weight="300" fill="#f97316" opacity="0.15">}</text>

  <!-- Name -->
  <text x="600" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#e2e8f0" letter-spacing="-2">Emilio Ranucoli</text>

  <!-- Divider line -->
  <rect x="480" y="250" width="240" height="3" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="'Fira Code', monospace" font-size="28" fill="#64ffda">Systems Engineer &amp; Data Scientist</text>

  <!-- Subtitle -->
  <text x="600" y="365" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#8892b0">ML · Python · Cloud · Custom Software Development</text>

  <!-- Logo area -->
  <text x="600" y="470" text-anchor="middle" font-family="'Fira Code', monospace" font-size="20" fill="#f97316" letter-spacing="6">RANUK DEVELOPMENT</text>

  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="'Fira Code', monospace" font-size="18" fill="#64ffda" opacity="0.7">ranuk.dev</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
